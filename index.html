<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitoring Rapor – SMK N 1 Kismantoro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue:      #1558b0;
      --blue-d:    #0d3d7a;
      --blue-l:    #e8f0fb;
      --blue-m:    #2e72c8;
      --bg:        #f4f6f9;
      --surface:   #ffffff;
      --border:    #e0e6ef;
      --text:      #0f1923;
      --text2:     #4a5668;
      --text3:     #9aaabb;
      --green:     #10b981;
      --green-l:   #d1fae5;
      --red:       #ef4444;
      --red-l:     #fee2e2;
      --amber:     #f59e0b;
      --amber-l:   #fef3c7;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.07);
      --shadow:    0 4px 12px rgba(0,0,0,.08);
      --r:          8px;
      --r-lg:      12px;
    }
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }

    /* ── HEADER ── */
    header { background: var(--blue-d); padding: 0 24px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 16px rgba(0,0,0,.2); }
    .h-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; gap: 16px; height: 60px; }
    .h-left { flex: 1; min-width: 0; }
    .h-title { color: #fff; font-weight: 700; font-size: 1.1rem; letter-spacing: -.01em; }
    .h-sub { color: rgba(255,255,255,.6); font-size: .75rem; }
    .btn-h { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.18); color: #fff; border-radius: var(--r); padding: 7px 14px; font-size: .8rem; font-weight: 600; cursor: pointer; transition: 0.2s; text-decoration: none; }
    .btn-h:hover { background: rgba(255,255,255,.25); }

    /* ── BREADCRUMB ── */
    .bc-wrap { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; position: sticky; top: 60px; z-index: 90; }
    .bc-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; height: 44px; gap: 4px; overflow-x: auto; scrollbar-width: none; }
    .bc-btn { background: none; border: none; font-family: inherit; font-size: .8rem; font-weight: 600; color: var(--blue); cursor: pointer; padding: 4px 8px; border-radius: 4px; white-space: nowrap; }
    .bc-btn:hover { background: var(--blue-l); }
    .bc-btn.cur { color: var(--text3); cursor: default; font-weight: 400; }
    .bc-sep { color: var(--text3); font-size: .75rem; }

    /* ── MAIN ── */
    main { max-width: 1100px; margin: 0 auto; padding: 24px 16px 80px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--shadow-sm); overflow: hidden; margin-bottom: 24px; }

    /* ── STATS PANEL (Halaman TA) ── */
    .ta-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .ta-stat-card { padding: 20px; border-top: 4px solid var(--border); }
    .ta-stat-card.complete { border-top-color: var(--green); background: var(--green-l); }
    .ta-stat-card.incomplete { border-top-color: var(--red); background: var(--red-l); }
    .ta-stat-title { font-weight: 700; font-size: 1rem; color: var(--blue-d); margin-bottom: 8px; }
    .ta-stat-desc { font-size: .8rem; color: var(--text2); }
    .ta-stat-missing { font-size: .75rem; color: var(--red); margin-top: 10px; font-weight: 600; }

    /* ── PAGE HEADER ── */
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid var(--border); }
    .page-title { font-size: 1.1rem; font-weight: 700; color: var(--blue-d); }
    .btn-action { background: var(--blue); color: white; padding: 8px 16px; border-radius: var(--r); font-size: .8rem; font-weight: 700; text-decoration: none; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-action:hover { background: var(--blue-m); box-shadow: var(--shadow); }

    /* ── GRID 3 KOLOM ── */
    .tingkat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; align-items: start; }
    .tingkat-col { display: flex; flex-direction: column; }
    .tingkat-head { background: var(--blue-d); color: white; padding: 12px; font-weight: 700; font-size: .9rem; border-radius: var(--r) var(--r) 0 0; text-align: center; }
    .tingkat-body { background: white; border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--r) var(--r); }

    .class-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #f1f5f9; }
    .class-row:last-child { border-bottom: none; }
    .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .dot-ok { background: var(--green); box-shadow: 0 0 0 4px var(--green-l); }
    .dot-miss { border: 2px solid var(--text3); background: transparent; }
    .dot-bad { background: var(--amber); box-shadow: 0 0 0 4px var(--amber-l); }
    
    .class-info { flex: 1; min-width: 0; }
    .class-name { font-size: .9rem; font-weight: 600; color: var(--text); }
    .class-sub { font-size: .65rem; color: var(--text3); font-family: 'JetBrains Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .btn-upload { font-size: .7rem; font-weight: 800; color: var(--blue); text-decoration: none; padding: 4px 8px; border: 1.5px solid var(--blue); border-radius: 6px; transition: 0.2s; }
    .btn-upload:hover { background: var(--blue); color: white; }

    /* ── FOLDER CARDS ── */
    .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
    .folder-card { padding: 24px; cursor: pointer; transition: all .2s; border: 1px solid var(--border); }
    .folder-card:hover { border-color: var(--blue); background: var(--blue-l); transform: translateY(-3px); box-shadow: var(--shadow); }
    .fc-tag { font-size: .7rem; font-weight: 800; color: var(--blue); text-transform: uppercase; margin-bottom: 4px; }
    .fc-name { font-weight: 700; font-size: 1.1rem; color: var(--blue-d); }
    .fc-meta { font-size: .75rem; color: var(--text3); margin-top: 10px; display: flex; align-items: center; gap: 6px; }

    /* ── STATE ── */
    .state { text-align: center; padding: 80px 20px; }
    .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { text-align: center; padding: 40px 16px; font-size: .8rem; color: var(--text3); border-top: 1px solid var(--border); margin-top: 40px; }

    @media (max-width: 900px) {
      .tingkat-grid, .ta-stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<script>
/* ════════════════════════════════
      KONFIGURASI & LOGIKA
════════════════════════════════ */
const CONFIG = {
  SCRIPT_URL: "https://script.google.com/macros/s/AKfycbx6haneCE4lnbOfaHqkCRCbyA7grBNN98_t9GBKwFWT1GHmw25d_s69lRVI2qcDRpOA/exec",
  SCHOOL: "SMK Negeri 1 Kismantoro",
};

// Aliasing Jurusan Lama ke Baru
const ALIAS_MAP = {
  'TKJ': 'TJKT',
  'TP': 'TPFL',
  'TBSM': 'TO'
};

const LEVELS  = ['X', 'XI', 'XII'];
const JURUSAN = [
  { kode: 'TJKT', jumlah: 3 },
  { kode: 'TPFL', jumlah: 2 },
  { kode: 'TO',   jumlah: 2 },
];

const EXPECTED_CLASSES = [];
for (const lvl of LEVELS) {
  for (const j of JURUSAN) {
    for (let i = 1; i <= j.jumlah; i++) {
      EXPECTED_CLASSES.push(`${lvl}${j.kode}${i}`);
    }
  }
}

/** * REGEX TOLERAN: 
 * Menambahkan \s* agar toleran terhadap spasi.
 */
const FORMAT_RE = /^RAPOR\s*(\d{4})\s*(Gasal|Genap)\s*((XII|XI|X)\s*(TJKT|TKJ|TPFL|TP|TO|TBSM)\s*([1-3]))$/i;

/**
 * Mendapatkan tingkat yang benar dari sebuah string kelas.
 */
function getStrictLevel(classStr) {
  if (classStr.startsWith('XII')) return 'XII';
  if (classStr.startsWith('XI')) return 'XI';
  if (classStr.startsWith('X')) return 'X';
  return '';
}

/**
 * Normalisasi nama kelas dari file Drive agar sesuai dengan EXPECTED_CLASSES
 */
function normalizeClassName(rawName) {
  const base = rawName.replace(/\.[^.]+$/, '').trim();
  const m = base.match(FORMAT_RE);
  if (!m) return null;
  
  const level = m[4].toUpperCase().trim();
  const jurRaw = m[5].toUpperCase().trim();
  const num = m[6].trim();
  
  const jurNorm = ALIAS_MAP[jurRaw] || jurRaw;
  return `${level}${jurNorm}${num}`;
}
</script>

<header>
  <div class="h-inner">
    <div class="h-left">
      <div class="h-title">Monitoring Rapor</div>
      <div class="h-sub" id="hSub"></div>
    </div>
    <button class="btn-h" onclick="doReload()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
      Refresh
    </button>
  </div>
</header>

<div class="bc-wrap">
  <div class="bc-inner" id="breadcrumb"></div>
</div>

<main id="mainArea">
  <div id="content"></div>
</main>

<footer id="foot"></footer>

<script>
let navStack = [];

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('hSub').textContent = CONFIG.SCHOOL;
  // Footer copyright diperbarui sesuai instruksi kamu
  document.getElementById('foot').textContent = `© 2026 • ANGGAFK • SMK NEGERI 1 KISMANTORO`;
  openFolder(null, 'Home', 'root');
});

function doReload() {
  const top = navStack.pop();
  if (top) openFolder(top.id, top.name, top.type);
}

function openFolder(id, name, type) {
  navStack.push({ id, name, type });
  renderBreadcrumb();
  load(id, type);
}

function goTo(idx) {
  navStack = navStack = navStack.slice(0, idx + 1);
  const top = navStack[navStack.length - 1];
  renderBreadcrumb();
  load(top.id, top.type);
}

function renderBreadcrumb() {
  document.getElementById('breadcrumb').innerHTML = navStack.map((item, i) => {
    const last = i === navStack.length - 1;
    const label = item.type === 'root' ? 'Home' : item.name;
    return `${i > 0 ? '<span class="bc-sep">/</span>' : ''}
      <button class="bc-btn ${last ? 'cur' : ''}" ${last ? '' : `onclick="goTo(${i})"`}>
        ${label}
      </button>`;
  }).join('');
}

async function fetchFromScript(folderId) {
  const url = folderId ? `${CONFIG.SCRIPT_URL}?folderId=${folderId}` : CONFIG.SCRIPT_URL;
  const res = await fetch(url);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error);
  return data.items;
}

async function load(folderId, type) {
  const container = document.getElementById('content');
  container.innerHTML = `<div class="state"><div class="spinner"></div><p>Menghubungkan ke Drive...</p></div>`;

  try {
    const items = await fetchFromScript(folderId);

    if (type === 'root') {
      const rootFolders = items.filter(i => i.type === 'folder');
      // URUTKAN BERDASARKAN NAMA (DESCENDING)
      rootFolders.sort((a, b) => b.name.localeCompare(a.name, undefined, { numeric: true, sensitivity: 'base' }));
      renderFolderGrid(rootFolders, 'year', 'Tahun Ajaran');
    } 
    else if (type === 'year') {
      const semesterFolders = items.filter(i => i.type === 'folder');
      renderYearPage(semesterFolders, folderId);
    } 
    else if (type === 'semester') {
      // Kirim semua items (termasuk folder) untuk mengecek kesalahan upload
      renderSemesterDashboard(items, folderId);
    }
  } catch (e) {
    container.innerHTML = `<div class="state"><p style="color:var(--red); font-weight:700;">Gagal memuat: ${e.message}</p></div>`;
  }
}

function renderFolderGrid(folders, nextType, tag) {
  if (!folders.length) {
    document.getElementById('content').innerHTML = `<div class="state"><p>Tidak ada folder.</p></div>`;
    return;
  }
  let html = `<div class="folder-grid">`;
  folders.forEach(f => {
    html += `
      <div class="card folder-card" onclick="openFolder('${f.id}','${f.name}','${nextType}')">
        <div class="fc-tag">${tag}</div>
        <div class="fc-name">${f.name}</div>
        <div class="fc-meta">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          Update terakhir: ${new Date(f.modifiedTime).toLocaleDateString('id-ID')}
        </div>
      </div>`;
  });
  html += `</div>`;
  document.getElementById('content').innerHTML = html;
}

async function renderYearPage(folders, taFolderId) {
  const container = document.getElementById('content');
  
  let html = `
    <div class="page-header">
      <div class="page-title">Ringkasan Semester</div>
    </div>
    <div id="taStatsArea" class="ta-stats-grid">
      <div class="state" style="grid-column: 1/-1;"><div class="spinner" style="width:24px; height:24px"></div> Menghitung kelengkapan...</div>
    </div>
    <div class="page-header">
      <div class="page-title">Pilih Semester</div>
    </div>
    <div class="folder-grid">`;
  
  folders.forEach(f => {
    html += `
      <div class="card folder-card" onclick="openFolder('${f.id}','${f.name}','semester')">
        <div class="fc-tag">Semester</div>
        <div class="fc-name">${f.name}</div>
        <div class="fc-meta">Update terakhir: ${new Date(f.modifiedTime).toLocaleDateString('id-ID')}</div>
      </div>`;
  });
  html += `</div>`;
  container.innerHTML = html;

  const statsArea = document.getElementById('taStatsArea');
  let statsHtml = "";

  for (const f of folders) {
    try {
      const files = await fetchFromScript(f.id);
      const uploaded = new Set();
      files.forEach(file => {
        const norm = normalizeClassName(file.name);
        if (norm && EXPECTED_CLASSES.includes(norm)) uploaded.add(norm);
      });

      const missing = EXPECTED_CLASSES.filter(k => !uploaded.has(k));
      const isComplete = missing.length === 0;

      statsHtml += `
        <div class="card ta-stat-card ${isComplete ? 'complete' : 'incomplete'}">
          <div class="ta-stat-title">Semester ${f.name}</div>
          <div class="ta-stat-desc">${uploaded.size} dari ${EXPECTED_CLASSES.length} kelas terupload</div>
          ${!isComplete 
            ? `<div class="ta-stat-missing">Belum lengkap: ${missing.join(', ')}</div>` 
            : `<div class="ta-stat-missing" style="color:var(--green)">✓ Berkas Lengkap</div>`}
        </div>`;
    } catch (e) {
      statsHtml += `<div class="card ta-stat-card">Gagal memuat data ${f.name}</div>`;
    }
  }
  statsArea.innerHTML = statsHtml;
}

function renderSemesterDashboard(items, folderId) {
  const uploaded = {};
  const unidentified = [];

  items.forEach(item => {
    // Cek jika item adalah folder (seharusnya tidak boleh ada di sini)
    if (item.type === 'folder') {
      unidentified.push(item);
      return;
    }

    // Cek format nama file
    const norm = normalizeClassName(item.name);
    if (norm && EXPECTED_CLASSES.includes(norm)) {
      uploaded[norm] = item;
    } else {
      unidentified.push(item);
    }
  });

  let html = `
    <div class="page-header">
      <div class="page-title">Status Upload per Kelas</div>
      <a href="https://drive.google.com/drive/folders/${folderId}" target="_blank" class="btn-action">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/></svg>
        Buka Folder
      </a>
    </div>
    <div class="tingkat-grid mb-6">
  `;

  LEVELS.forEach(lvl => {
    const levelClasses = EXPECTED_CLASSES.filter(k => getStrictLevel(k) === lvl);
    
    html += `
      <div class="tingkat-col">
        <div class="tingkat-head">Tingkat ${lvl}</div>
        <div class="tingkat-body">`;
    
    levelClasses.forEach(kelas => {
      const file = uploaded[kelas];
      html += `
        <div class="class-row">
          <div class="dot ${file ? 'dot-ok' : 'dot-miss'}"></div>
          <div class="class-info">
            <div class="class-name" style="${!file ? 'color:var(--text3)' : ''}">${kelas}</div>
          </div>
          ${!file ? `<a href="https://drive.google.com/drive/folders/${folderId}" target="_blank" class="btn-upload">Upload</a>` : ''}
        </div>`;
    });

    html += `</div></div>`;
  });

  html += `</div>`;

  // SEKSI: File lain
  if (unidentified.length > 0) {
    // Menambah margin-top: 40px untuk memberi jarak dengan tabel di atasnya
    html += `
      <div class="page-header" style="margin-top: 40px">
        <div class="page-title" style="color:var(--amber)">File lain</div>
      </div>
      <div class="card" style="border-color: var(--amber-l)">`;
    
    unidentified.forEach(item => {
      html += `
        <div class="class-row" style="background: #fffdf9">
          <div class="dot dot-bad"></div>
          <div class="class-info">
            <div class="class-name" style="color: var(--amber)">${item.name}</div>
          </div>
        </div>`;
    });
    
    html += `</div>`;
  }

  document.getElementById('content').innerHTML = html;
}
</script>
</body>
</html>
